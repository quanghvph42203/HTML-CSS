  <body>
    <h1>Buổi 4: Tìm hiểu thẻ body- thẻ heading h1-h6, thẻ p</h1>

    <!-- Thẻ h: h1-h6 - được sử dụng để định nghĩa tiêu đề của trang web -->

    <h1>Tiêu đề lớn nhất</h1>
    <h2>Tiêu đề lớn vừa</h2>
    <h3>Tiêu đề vừa</h3>
    <h4>Tiêu đề nhỏ hơn</h4>
    <h5>Tiêu đề nhỏ hơn nữa</h5>
    <h6>Tiêu đề nhỏ nhất</h6>
    <hr />

    <!-- Thẻ p: paragraph để chứa các đoạn văn bản -->
    <p>Lorem ipsum dolor sit amet.</p>
    <p>Lorem ipsum dolor sit amet.</p>
    <p>Lorem ipsum dolor sit amet.</p>
    <p>Lorem ipsum dolor sit amet.</p>
    <p>Lorem ipsum dolor sit amet.</p>

    <!-- ALT +  SHIFT + MŨI TÊN ĐI XUỐNG: copy-paste -->
