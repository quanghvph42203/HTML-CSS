    <h1>
      Git Pull and Resolve Conflicts ( Kéo code về máy tính và xử lý xung đột )
    </h1>
    <!-- vmware workstation: máy chủ ảo -->
    <h2>Nguyễn Văn A</h2>

    <h2>Hướng dẫn kéo code từ dự án về</h2>
    <!-- B1: Mở terminal và khởi tạo bằng lệnh - git init
         B2: git remote add origin + link dự án
         B3: Chuyển sang nhánh main bằng lệnh: git branch -M main
         B4: Kéo code về bằng lệnh: git pull origin main-->

    <h2>Dự án nhóm làm chung</h2>
    <!-- + Trước khi làm dự án thì bắt buộc phải kéo code về bằng lệnh git pull origin main
   -->
    <h2>NHỮNG LỖI KHI LÀM DỰ ÁN NHÓM</h2>
    <!-- + Chưa kéo code về đã push code rồi gặp lỗi xung đột code
 vì trên github code đã có sự thay đổi rồi
 + current change: lần thay đổi hiện tại
 + Incoming change: code ở trên github -->

    <!--
 - Sửa lỗi trên bằng cách:
 + kéo code về bằng lệnh git pull origin main
 + chọn "Accept Current Change" hoặc "Accept Incoming": Chọn code tối ưu hơn
 + Result: kết quả
 + Chọn complete Merge
 + Chọn complete with Conflicts
 + Chọn close with Conflicts
 + Tiếp theo commit và push code mới lên -->
