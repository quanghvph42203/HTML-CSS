<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Combinator selectors p2 - element,element - CLASS1.class2</h1>
    <!-- 1. element,element
     EX: div,p -> chọn tất cả các thẻ div,p -->
    <h1 class="demo">Tiêu đề</h1>
    <h2>tiêu đề 1</h2>
    <h2>tiêu đề 2</h2>
    <h2>tiêu đề 3</h2>
    <h2 id="item">tiêu đề 4</h2>
    <h2>tiêu đề 5</h2>
    <p>nội dung 1</p>
    <p>nội dung 2</p>
    <p>nội dung 3</p>

    <!-- 2. class.class
     EX: .name1.name2 -> Chọn tất cả các thẻ đồng thời class name là name1 và name2 -->
    <h1 class="title">Tiêu đề</h1>
    <h3 class="title title2">Tiêu đề 1</h3>
    <h3>Tiêu đề 2</h3>
    <h3>Tiêu đề 3</h3>
    <h3>Tiêu đề 4</h3>
    <h3>Tiêu đề 5</h3>
  </body>
</html>
