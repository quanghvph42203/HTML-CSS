    <!-- Cú pháp: border: <line-width> (độ rộng) || <line-style> (kiểu viền) || <color> (màu sắc)
        EX: border: 10px solid blue
        + 1 số thuộc tính viền thay cho solid (nét liền):
        - dashed: đường nét đứt
        - dotted: viền là các chấm dot
        - double: viền 2 đường song song liền nhau
        - groove: viền 3D
        - ridge: viền 3D
        - inset: viền 3D
        - outset: viền 3D  -->
