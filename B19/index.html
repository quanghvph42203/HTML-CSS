<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>
      HTML code tag - Tìm hiểu và sử dụng thẻ code để định dạng mã nguồn trong
      trang web
    </h1>
    <!-- WEBSITE: https://codebeautify.org/html-escape-unescape -->
    <!-- Thẻ <code>: là 1 thẻ có ngữ nghĩa
        + sử dụng khi có 1 đoạn code, trình duyệt sẽ hiểu đây là 1 đoạn code -->
    <h2>Học thẻ code</h2>
    <pre><code>&lt;head&gt;
    &lt;meta charset=&quot;UTF-8&quot;&gt;
    &lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;&gt;
    &lt;title&gt;Document&lt;/title&gt;
&lt;/head&gt;</code></pre>
  </body>
</html>
