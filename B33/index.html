<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Attribute Selectors part 1</h1>
    <!-- 1. [Attribute]
     EX: [href] -> Chọn tất cả thẻ có thuộc tính (property): href -->
    <a href="">Click 1</a>
    <a href="">Click 2</a>
    <a href="">Click 3</a>
    <p href>Lorem ipsum dolor sit amet.</p>

    <!-- [Attribute=value]
EX: [target="_blank"] -> Chọn tất cả các thuộc tính có chính xác giá trị: target="_blank" -->
    <a href="" target="_blank">click 1</a>
    <a href="" target="_blank">click 2</a>
    <a href="" target="_self">click 3</a>
  </body>
</html>
