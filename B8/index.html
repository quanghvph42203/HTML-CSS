    <h1>Tìm hiểu thẻ a</h1>

    <!-- + href: được dùng để khai báo URL mà trang web chuyển đến
      + <a href="">Nếu value để trống tải lại trang</a> 
      + <a href="#">Nếu value để # trở lên trang đầu</a> 
      EX:  -->
    <a href="https://thanhnien.vn/">Click vào đây</a>

    <!-- <a href="" target=""></a> -->
    <!-- + thuộc tính "target" trong thẻ a được sử dụng để chỉ định cách mở liên kết được nhúng trong thẻ đó -->
    <!-- + 1 số thuộc tính của target: 
     <a href="" target="_self"> Mở tại trang hiện tại</a>
      <a href="" target="_blank"> Mở trong tab mới</a> 
     <a href="">Mở tại trang hiện tại</a>
      <a href="tel: 123456">Chuyển hướng đến 1 ứng dụng có thể gọi nếu máy đã cài</a> 
      <a href="mailto:havietquang@gmail.com">Chuyển hướng đến 1 ứng dụng để gửi mail</a>
       + 1 số tham số có thể truyền trước cho mailto: 
       - cc: danh sách email sẽ nhận được bản sao của thư 
       - bcc: danh sách email ẩn sẽ nhận được bản sao của thư 
       - subject: chủ đề của thư - body: nội dung của mail 
       - ?: dấu phân cách giữa phần mailto và tham số 
       - &: dấu phân cách tham số-->
