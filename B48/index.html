<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>CSS LAYOUT - DISPLAY (Block, inline và inline-block)</h1>
    <!-- + Các thẻ HTML đều có thuộc tính display: block, inline và inline-block
     + Các thẻ HTML đều có trạng thái display mặc định, 2 giá trị cơ bản của display là: block và inline -->

    <h2>2. Block Element</h2>
    <!-- + Các thẻ ở trạng thái mặc định, luôn chiếm 100% chiều rộng của thẻ cha bất kể nội dung dài hay ngắn
     VD: div, p, h1, h2, ul, ol,... 
     + Thẻ block luôn chiếm hết 100% chiều ngang của thẻ cha chứa nó -->
    <h1>Tự học lập trình web</h1>
    <h2>Thẻ h2</h2>
    <h3>Thẻ h3</h3>

    <h2>3. Inline Element</h2>
    <!-- + Hộp có kích thước phụ thuộc vào nội dung bên trong nó
     VD: a, strong, em, button,... 
     *** CHÚ Ý: 1 số thuộc tính CSS không áp dụng được với inline element:
     1. padding-top, padding-bottom
     EX:
     .line2{
     padding: 30px;
     background-color: blue;
     }
     + padding vẫn mở rộng nhưng không đẩy được phần padding-top và padding-bottom
     2. margin-top, margin-bottom
     + margin không áp dụng được lên margin-top và margin-bottom
     3. width, height, min-width, min-height
     *** Sở dĩ inline element không áp dụng được 1 số thuộc tính trên vì nó sinh ra để nằm trên
     cùng 1 hàng, và để tránh phá vỡ cấu trúc dòng (inline: trong dòng)
     -->
    <h1>Thẻ h1 <strong>tiêu đề lớn nhất</strong></h1>
    <h2>Thẻ h2 <strong class="line2">tiêu đề lớn vừa</strong></h2>
    <h3>Thẻ h3 <strong>tiêu đề vừa</strong></h3>
    <!-- Trường hợp muốn thẻ inline áp dụng được 3 thuộc tính trên thì ta dùng display: inline-block; -->

    <h2>3. Inline Block</h2>
    <!-- + Là sự kết hợp của 2 khối inline và block -->
  </body>
</html>
