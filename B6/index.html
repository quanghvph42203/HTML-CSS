<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Tìm hiểu thẻ b, i, u</h1>
    <!-- Thẻ b: bold - in đậm (dùng strong thay thế thể hiện nội dung quan trọng) -->
    <p>Họ tên: <b>Hà Việt Quang</b></p>

    <!-- Thẻ i: italic - in nghiêng (dùng em để nhấn mạnh nội dung) -->
    <p>Nghành: <i>Lập Trình Web</i></p>

    <!-- Thẻ u: underline - gạch chân -->
    <p>Công Việc: <u>Lập trình viên</u></p>
  </body>
</html>
