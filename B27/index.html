<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>
      CSS Prefix - Tăng cường tương thích đa trình duyệt cho website:
      caniuse.com
    </h1>
    <!-- CSS Prefix:
     + khái quát: CSS có rất nhiều thuộc tính và không phải
      thuộc tính nào cũng hỗ trợ tất cả các trình duyệt
      + khi gặp các thuộc tính không hỗ trợ all trình duyệt,
      cần thêm tiền tố prefix để được hỗ trợ -->

    <!-- WEBSITE KIỂM TRA TRÌNH DUYỆT PREFIX: https://www.geeksforgeeks.org/css/explain-css-vendor-prefixes/
     EX: Internet Explorer: -ms-
         Chrome: -webkit-
         Safari: -webkit-
         Firefox: -moz-
         iOS: -webkit-
         Android: -webkit-
         Opera: -o-
         Microsoft Edge:-ms- -->

    <!-- WEBSITE: https://autoprefixer.github.io/ -->
    <!-- Auto prefix: có thể copy css
           -> trang web sẽ tự thêm prefix cho những thuộc tính cần thiết -->

    <!-- caniuse.com: trang web hỗ trợ kiểm tra thuộc tính CSS 
     có cần sử dụng thêm prefix để hỗ trợ đa trình duyệt
     + màu xanh: hỗ trợ
     + màu đỏ: không hỗ trợ -->
  </body>
</html>
