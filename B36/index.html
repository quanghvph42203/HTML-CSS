<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Pseudo-classes (lớp giả) p2</h1>
    <h2>:link</h2>
    <!-- EX:
     a:link - Chọn các thẻ a có liên kết chưa click vào -->
    <a class="click" href="http://tuhoc.cc">Click đường dẫn</a>

    <h2>:visited</h2>
    <!-- EX:
      a:visited - Chọn các thẻ a có liên kết đã click truy cập -->
    <a href="https://vietnamnet.vn/" class="click2" target="_blank">Click</a>
  </body>
</html>
