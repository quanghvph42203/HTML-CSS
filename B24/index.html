  <body>
    <h1>
      CSS cho người mới - Opacity (độ trong suốt), Display và Visibility giải
      thích đơn giản
    </h1>
    <h2>Opacity</h2>
    <!-- + quy định độ trong suốt - chiếm không gian
     + 0.0 -> 1.0: mờ nhất -> rõ nhất
     + 0% -> 100%: mờ nhất -> rõ nhất  -->

    <h3>Display</h3>
    <!-- + display: none - ẩn phần tử khỏi giao diện ( xóa cả không gian nó đang chiếm) -->

    <h4>Visibility</h4>
    <!-- + ẩn (hidden) hoặc hiện (visible) element - chiếm không gian -->

    <h2>So sánh 3 thuộc tính</h2>
