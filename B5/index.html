<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Tìm hiểu thẻ hr, br - thẻ tự đóng html -self-closing tag html</h1>
    <!-- Thẻ <br> - break: ngắt dòng -->
    <p>
      Lorem ipsum dolor sit amet. <br />
      Lorem ipsum dolor sit amet. <br />
      Lorem ipsum dolor sit amet. <br /> <hr>
      Lorem ipsum dolor sit amet. <br />
    </p>
    <!-- Thẻ <hr> - horizontal rule: tạo đường kẻ ngang ngăn cách trên trang -->
  </body>
</html>
