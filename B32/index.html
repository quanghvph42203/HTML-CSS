<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Combinator selectors p4 - element+element - element~element</h1>
    <!--1. Element+element 
    EX: div+p -> Chọn phần tử <p> đầu tiên được đặt ngay sau phần tử <div> -->
    <h1>Tiêu đề</h1>
    <h2 class="title">Tiêu đề 1</h2>
    <h3>Tiêu đề 2</h3>
    <h2>Tiêu đề 3</h2>
    <h2>Tiêu đề 4</h2>
    <h2>Tiêu đề 5</h2>

    <!-- 2. Element~element
     EX: div~ul -> Chọn tất cả thẻ <ul> nằm sau thẻ <div>  -->
    <div>
      <p>Nội dung</p>
      <span>
        <p>Nội dung 2</p>
      </span>
    </div>
    <p>Nội dung 3</p>
    <a href="">click</a>
  </body>
</html>
