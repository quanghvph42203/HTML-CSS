<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Pseudo-classes (lớp giả) p1</h1>
    <!-- Được sử dụng để định nghĩa một trạng thái đặc biệt của 1 phần tử
     + Cú pháp chung: selector:pseudo-classes{
     khối lệnh css
     } -->
    <h2>:hover</h2>
    <!-- EX:
      p:hover - Chọn các thẻ p khi di chuột qua
       -->
    <p>Lorem ipsum dolor sit amet.</p>
    <p>
      Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ea, eveniet.
    </p>

    <h2>:active</h2>
    <!-- EX:
       a:active - Chọn các thẻ a khi nhấn giữ chuột -->
    <a href="">Đường dẫn</a>
  </body>
</html>
