<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>
      Combinator selectors (bộ chọn kết hợp) p1 - * Selector - element.class -
      Kỹ thuật CSS không thể bỏ qua
    </h1>

    <!-- 1. *selector - chọn tất cả element
          EX:  -->
    <h2>Tuổi trẻ</h2>
    <h2 class="demo">là những</h2>
    <h3 class="demo">bước đi</h3>
    <h3 id="line4">chập chững</h3>
    <ul>
      <li>nội dung 1</li>
      <li>nội dung 2</li>
      <li>nội dung 3</li>
    </ul>
    <!-- 2. element.class
     EX: p.intro -> chọn tất cả các thẻ p có class là intro -->
    <p class="intro">nội dung 1</p>
    <p>nội dung 2</p>
    <p class="intro">nội dung 3</p>
  </body>
</html>
