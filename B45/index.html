<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>CSS Box-Sizing</h1>
    <!-- Có 2 giá trị:
     + content-box (giá trị mặc định)
     -- width, height là kích thước của content
     + border-box (giá trị thường xuyên sử dụng)
     -- width, height là kích thước của phần tử
     - Thực tế dự án, ta sử dụng border-box thường xuyên hơn, để kích thước khớp với thiết kế
     tránh phải tính toán lại phần nội dung-->
    <h3>Nội dung trên</h3>
    <div class="box box1"></div>
    <div class="box box2"></div>
    <h3>Nội dung dưới</h3>
  </body>
</html>
