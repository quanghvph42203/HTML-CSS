  <head>
    <meta charset="UTF-8" />

  <body>
    <h1>CSS Box model Hướng dẫn chi tiết về thuộc tính padding</h1>
    <h2>1. Box model - mô hình hộp css</h2>
    <!-- Trình duyệt luôn coi mỗi phần tử là 1 box - hộp chữ nhật -->
    <!-- Box - hộp chữ nhật bao gồm:
      + Nội dung (width, height) -> hình ảnh, text, video...
      + Padding -> khoảng đệm nội dung và viền (không chứa nội dung)
      + Border -> viền của phần tử (viền nét liền, đứt...)
      + Margin -> Khoảng cách với các phần tử liền kề khác
      - Kích thước của 1 phần tử = content + padding + border (không bao gồm margin) -->

    <h2>2. Box model - padding</h2>
    <div>Tuhoc.cc</div>

    <h2>Padding - property: các thuộc tính padding cơ bản</h2>
    <!-- + padding: 20px - cả 4 hướng
         + padding-top: 20px - trên
         + padding-bottom: 20px - dưới
         + padding-left: 20px - trái
         + padding-right: 20px - phải -->

    <h2>Padding - property: các thuộc tính padding nâng cao</h2>
    <!-- + padding: 20px - cả 4 hướng
         + padding: 20px 10px - trái phải
         + padding: 20px (trên) 10px (trái phải) 40px (dưới)
         + padding: 20px (trên) 10px (phải) 15px (dưới) 25px (trái)  -->
  </body>
</html>
