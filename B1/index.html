    <!-- Các extension cần cài đặt sau khi cài đặt Visual studio code 
1./ Extension: Prettier - tự động định dạng lại code trông đẹp và dễ nhìn hơn
 2./ Setting: Format on save - tự động định dạng tệp mỗi khi lưu
 3./ Setting: Auto save sau đó chọn onFocusChange - Để tự động lưu tệp, tránh mất công toi 
4./ Extension: Material Icon Theme - Cài đặt icon theme vscode - Để tạo các biểu tượng 
thư mục vscode nhìn trực quan hơn khi tương tác thư mục 
5./ Extension: Image preview, Color Highlight, Auto rename tag, 
live server - 4 tiện ích này giúp hiển thị hình ảnh thu nhỏ khi coding.
 6./ Extension: Live server preview - hiển thị page ngay trong trình 
 vscode để tiện quan sát. (Cách dùng: press "F1", type "Show Live Server Preview")
 7./ Extension: Code Spell Checker và Vietnamese code spell checker - tự động kiểm tra
  chính tả bảng tiếng anh và tiếng việt
 8./ Extension: html tag wrap (Cách dùng: bôi đen vùng cần thêm tag, sau đó press "Alt+W")
 9./ Extension: HTML to CSS autocompletion - tự động gợi ý tên class, id trong css
